profile: default

reflex:
  deploy_url: https://oriole-guiding-miserably.ngrok-free.app
  api_url: https://oriole-guiding-miserably.ngrok-free.app
  frontend_port: 8080
  backend_port: 3030
  workers: 2
  single_port: true

app:
  version: 1.8.1
  name: appkit App
  logging: logging.prod.yaml
  environment: prod
  backend_timeout: 180 # seconds

  database:
    username: secret:mn-db-user
    password: secret:mn-db-password
    host: secret:mn-db-host
    port: 5432
    name: secret:mn-db-name
    encryption_key: secret:mn-db-encryption-key
    pool_size: 10 # change only when needed
    max_overflow: 20 # change only when needed
    pool_recycle: 1800 # seconds; recycle connections to prevent stale SSL
    echo: False # Set to True to enable SQL logging

  authentication:
    session_timeout: 25 # minutes
    auth_token_refresh_delta: 10 # minutes
    session_monitor_interval_seconds: 60 # seconds
    server_url: https://oriole-guiding-miserably.ngrok-free.app
    server_port: 8080

    oauth_providers:
      - provider: "github"
        client_id: secret:mn-oauth-github-client-id
        client_secret: secret:mn-oauth-github-client-secret
        redirect_url: https://oriole-guiding-miserably.ngrok-free.app/oauth/github/callback

    # Email provider for password reset (mock for local development)
    email_provider:
      provider: "mock" # "mock" | "resend" | "azure"
      # api_key: secret:mn-resend-api-key # Uncomment for resend
      # connection_string: secret:mn-azure-email-connection-string # Uncomment for Azure
      from_email: "no-reply@appkit.dummy"
      from_name: "AppKit Framework"

    password_reset:
      token_expiry_minutes: 10
      max_requests_per_hour: 3
      templates_dir: ./assets/email-templates

  assistant:
    # Set to a model ID (e.g. "gpt-5-mini") to pin the default; empty = first available
    default_model: "gpt-5-mini"
    file_upload:
      vector_store_expiration_days: 2
      max_file_size_mb: 50
      max_files_per_thread: 10
      cleanup_interval_minutes: 60

  imagegenerator:
    tmp_dir: ./uploaded_files
    cleanup_days_threshold: 60
    openai_model: gpt-5-mini

  mcp_user:
    openai_model: gpt-5-mini

  mcp_bpmn:
    storage_dir: ./uploaded_files/bpmn
    default_model: gpt-5.3-codex
    max_file_size_mb: 10
    diagram_types:
      - process
      - collaboration
      - choreography

  mcp_image:
    backend_server: https://oriole-guiding-miserably.ngrok-free.app #http://localhost:3030
    max_file_size_mb: 10
    max_images_to_keep: 50

    generator: "google" # "azure" | "google"

    #azure_api_key: secret:mn-azure-api-key
    #azure_base_url: secret:mn-azure-endpoint
    #azure_prompt_optimizer: "gpt-5-mini"
    #azure_image_model: "FLUX.1-Kontext-pro" # "gpt-image-1.5" | "gpt-image-1-mini"

    google_api_key: secret:mn-google-api-key
    google_prompt_optimizer: "gemini-3.1-flash-lite-preview"
    google_image_model: "gemini-3.1-flash-image-preview" # "gemini-3-pro-image-preview"

    auth_tokens:
      - id: secret:mn-image-default-auth-token
        token:
          client_id: "default-client-id"
          scopes:
            - "image:generate"
            - "image:edit"
      - id: secret:mn-image-guest-auth-token
        token:
          client_id: "guest-user-id"
          scopes:
            - "image:generate"
